suite: hooks - job
templates:
  - templates/hooks/job.yaml

tests:
  - it: hook.enabled=falseмқҙл©ҙ Jobмқҙ л ҢлҚ”л§Ғлҗҳм§Җ м•Ҡм•„м•ј н•ңлӢӨ
    asserts:
      - hasDocuments:
          count: 0

  - it: ArgoCD hook м„Өм • мӢң argocd.argoproj.io/hook annotationмқҙ м Ғмҡ©лҗҳм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
              syncWave: "-1"
              hookDeletePolicy: BeforeHookCreation
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook"]
          value: PreSync

  - it: ArgoCD hook м„Өм • мӢң sync-wave annotationмқҙ м Ғмҡ©лҗҳм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
              syncWave: "-1"
              hookDeletePolicy: BeforeHookCreation
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"

  - it: ArgoCD hook м„Өм • мӢң hook-delete-policy annotationмқҙ м Ғмҡ©лҗҳм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
              syncWave: "-1"
              hookDeletePolicy: BeforeHookCreation
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook-delete-policy"]
          value: BeforeHookCreation

  - it: ArgoCD hook м„Өм • мӢң helm.sh/hook annotationмқҙ м—Ҷм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - isNull:
          path: metadata.annotations["helm.sh/hook"]

  - it: argocd лё”лЎқмқҙ м—Ҷмңјл©ҙ helm.sh/hook annotationмқҙ м Ғмҡ©лҗҳм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - isNull:
          path: metadata.annotations["argocd.argoproj.io/hook"]

  - it: Helm hookм—җ hookWeight annotationмқҙ м„Өм •лҗҳм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            hookWeight: "5"
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "5"

  - it: Helm hookм—җ hookDeletePolicy annotationмқҙ м„Өм •лҗҳм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            hookDeletePolicy:
              - before-hook-creation
              - hook-succeeded
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded

  - it: vault лҜём„Өм • мӢң нҢЁлӢү м—Ҷмқҙ л ҢлҚ”л§Ғлҗҳм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - isKind:
          of: Job

  - it: Job мқҙлҰ„мқҙ release nameкіј job name мЎ°н•©мқҙм–ҙм•ј н•ңлӢӨ
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            image:
              hub: 387526857220.dkr.ecr.ap-northeast-2.amazonaws.com/modusign
              repository: myapp
              tag: abc123
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-db-migration
