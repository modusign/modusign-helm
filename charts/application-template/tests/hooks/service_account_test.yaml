suite: hooks - service account
templates:
  - templates/hooks/service-account.yaml

tests:
  - it: serviceAccount.create가 없으면 ServiceAccount가 렌더링되지 않아야 한다
    asserts:
      - hasDocuments:
          count: 0

  - it: Helm hook + serviceAccount.create=true 시 helm.sh/hook annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            serviceAccount:
              create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - isNull:
          path: metadata.annotations["argocd.argoproj.io/hook"]

  - it: Helm hook의 기본 hookDeletePolicy가 ServiceAccount에도 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            hookDeletePolicy:
              - before-hook-creation
              - hook-succeeded
            serviceAccount:
              create: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded

  - it: ArgoCD hook + serviceAccount.create=true 시 argocd.argoproj.io/hook annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
              syncWave: "-1"
              hookDeletePolicy: BeforeHookCreation
            serviceAccount:
              create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook"]
          value: PreSync
      - isNull:
          path: metadata.annotations["helm.sh/hook"]

  - it: ArgoCD hook + serviceAccount.create=true 시 sync-wave annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
              syncWave: "-1"
              hookDeletePolicy: BeforeHookCreation
            serviceAccount:
              create: true
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"

  - it: ArgoCD hook + serviceAccount.create=true 시 hook-delete-policy annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
              syncWave: "-1"
              hookDeletePolicy: BeforeHookCreation
            serviceAccount:
              create: true
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook-delete-policy"]
          value: BeforeHookCreation

  - it: ServiceAccount 이름이 release name과 job name 조합이어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            serviceAccount:
              create: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-db-migration

  - it: serviceAccount.name이 지정되면 해당 이름으로 ServiceAccount가 생성되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            serviceAccount:
              create: true
              name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
