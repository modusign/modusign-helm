suite: hooks - secret
templates:
  - templates/hooks/secret.yaml

tests:
  - it: vault.enabled=false이면 Secret이 렌더링되지 않아야 한다
    asserts:
      - hasDocuments:
          count: 0

  - it: Helm hook + vault 설정 시 helm.sh/hook annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            vault:
              enabled: true
              path: argo-system:myapp-stage
              secrets:
                MY_SECRET: <MY_SECRET>
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - isNull:
          path: metadata.annotations["argocd.argoproj.io/hook"]

  - it: Helm hook의 기본 hookDeletePolicy가 Secret에도 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: pre-upgrade-job
            hook: pre-upgrade
            hookDeletePolicy:
              - before-hook-creation
              - hook-succeeded
            vault:
              enabled: true
              path: argo-system:myapp-stage
              secrets:
                MY_SECRET: <MY_SECRET>
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded

  - it: ArgoCD hook + vault 설정 시 argocd.argoproj.io/hook annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            vault:
              enabled: true
              path: argo-system:myapp-stage
              argocd:
                hook: PreSync
                syncWave: "-2"
                hookDeletePolicy: HookSucceeded
              secrets:
                MY_SECRET: <MY_SECRET>
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook"]
          value: PreSync
      - isNull:
          path: metadata.annotations["helm.sh/hook"]

  - it: ArgoCD hook + vault 설정 시 sync-wave annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            vault:
              enabled: true
              path: argo-system:myapp-stage
              argocd:
                hook: PreSync
                syncWave: "-2"
                hookDeletePolicy: HookSucceeded
              secrets:
                MY_SECRET: <MY_SECRET>
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-2"

  - it: ArgoCD hook + vault 설정 시 hook-delete-policy annotation이 적용되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            vault:
              enabled: true
              path: argo-system:myapp-stage
              argocd:
                hook: PreSync
                syncWave: "-2"
                hookDeletePolicy: HookSucceeded
              secrets:
                MY_SECRET: <MY_SECRET>
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook-delete-policy"]
          value: HookSucceeded

  - it: vault Secret에 avp.kubernetes.io/path annotation이 설정되어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            vault:
              enabled: true
              path: argo-system:myapp-stage
              argocd:
                hook: PreSync
              secrets:
                MY_SECRET: <MY_SECRET>
    asserts:
      - equal:
          path: metadata.annotations["avp.kubernetes.io/path"]
          value: argo-system:myapp-stage

  - it: Secret 이름이 release name과 job name 조합이어야 한다
    set:
      hook:
        enabled: true
        jobs:
          - name: db-migration
            argocd:
              hook: PreSync
            vault:
              enabled: true
              path: argo-system:myapp-stage
              argocd:
                hook: PreSync
              secrets:
                MY_SECRET: <MY_SECRET>
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-db-migration
