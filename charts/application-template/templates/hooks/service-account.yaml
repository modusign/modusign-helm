{{- if .Values.hook.enabled }}
{{- range $jobIndex, $job := .Values.hook.jobs }}
{{- with $job.serviceAccount }}
{{- if .create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .name | default (printf "%s-%s" $.Release.Name $job.name | trunc 63 | trimSuffix "-") }}
  namespace: {{ $.Release.Namespace }}
  labels:
  {{- include "application.commonLabels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
  {{- with (mergeOverwrite (deepCopy $.Values.global.serviceAccount.annotations) (.annotations | default dict)) }}
  {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
    {{- if $job.argocd }}
    argocd.argoproj.io/hook: {{ $job.argocd.hook | default "PreSync" }}
    {{- if $job.argocd.syncWave }}
    argocd.argoproj.io/sync-wave: {{ $job.argocd.syncWave | quote }}
    {{- end }}
    {{- if $job.argocd.hookDeletePolicy }}
    argocd.argoproj.io/hook-delete-policy: {{ $job.argocd.hookDeletePolicy }}
    {{- end }}
    {{- else }}
    "helm.sh/hook": {{ $job.hook | default "pre-install" | quote }}
    {{- if $job.hookWeight }}
    "helm.sh/hook-weight": {{ $job.hookWeight | quote }}
    {{- end }}
    {{- if $job.hookDeletePolicy }}
    "helm.sh/hook-delete-policy": {{ $job.hookDeletePolicy | join "," | quote }}
    {{- else }}
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
    {{- end }}
    {{- end }}
{{- with $.Values.global.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
